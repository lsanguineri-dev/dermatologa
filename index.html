<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dra. Andrea Vaccarini - Dermatóloga</title>

<style>

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: url('banner.jpg') no-repeat center center;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    font-family: Arial, Helvetica, sans-serif;
}

/* Barra de iconos */

.icons {
    position: fixed;

    left: 50%;
    transform: translateX(-50%);

    bottom: max(28px, env(safe-area-inset-bottom));

    display: flex;
    align-items: center;
    justify-content: center;

    gap: 28px;

    padding: 14px 22px;

    border-radius: 999px;

    background: rgba(255,255,255,0.65);

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    z-index: 1000;
}

.icons a {

    display: inline-flex;

    width: 38px;
    height: 38px;

    opacity: 0.95;

    transition: all .25s ease;
}

.icons a:hover {

    opacity: 1;

    transform: scale(1.15);
}

.icons img {

    width: 100%;
    height: 100%;

    display: block;
}

/* Mobile */

@media (max-width: 768px) {

    body {

        background-position: center center;
        background-size: cover;
    }

    .icons {

        gap: 22px;

        padding: 12px 18px;

        bottom: max(20px, env(safe-area-inset-bottom));
    }

    .icons a {

        width: 34px;
        height: 34px;
    }
}

</style>

</head>

<body>

<div class="icons">


<a href="javascript:void(0);"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Instagram">

    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"
         alt="Instagram">

</a>

<a href="https://wa.me/541136559056"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="WhatsApp">

    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg"
         alt="WhatsApp">

</a>

<a href="https://maps.app.goo.gl/iLFmLWRXGFv9rz9Y7"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Google Maps">

    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/googlemaps.svg"
         alt="Google Maps">

</a>


</div>

</body>

</html>
